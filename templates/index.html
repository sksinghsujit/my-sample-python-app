<h1>The UNREAL Employees App - Py</h1>
<table border="1">
    <tr>
        <th>Name</th>
        <th>Title</th>
        <th>Designation</th>
        <th>Year of Joining</th>
        <th>Date of Birth</th>
    </tr>
    {% for emp in employees %}
    <tr>
        <td>{{ emp.firstname }}</td>
        <td>{{ emp.title }}</td>
        <td>{{ emp.designation }}</td>
        <td>{{ emp.year_of_joining }}</td>
        <td>{{ emp.date_of_birth }}</td>       
    </tr>
    {% endfor %}
</table>
